name: main

on:
  push:
    branches: [ "main" ]


permissions:
  contents: read
  security-events: write




jobs:
  first:
    uses: ./.github/workflows/reusable-build-test.yml


  second:
    needs: first
    uses: ./.github/workflows/docker-reusable.yml
    with:
      image: my-app
      tag: latest
    secrets:
        docker_username: ${{ secrets.DOCKER_USERNAME }}
        docker_token: ${{ secrets.DOCKER_TOKEN }}

  deploy:
    runs-on: ubuntu-latest
    needs: second
    environment: production
    env:
      node: --trace-deprecation
    steps:
      - name: Image deploying to prodcution
        env:
          image: ${{ needs.second.outputs.my-outputs }}
        run: echo "Deploying image- $image to production"

      - name: login to docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.docker_username }}
          password: ${{ secrets.docker_token }}


      - name: Run trivy vulenrabilities
        id: view
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: '${{ secrets.DOCKER_USERNAME }}/my-app:latest'
          format: 'table'
          output: 'trivy.txt'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          trivy-config: 'trivy.yaml'

      - name: run trivy serif'
        id: trivy-serif
        uses: aquasecurity/trivy-action@v0.36.0
        with:
           image-ref: '${{ secrets.DOCKER_USERNAME }}/my-app:latest'
           format: 'sarif'
           output: 'trivy-results.sarif'
           severity: 'CRITICAL,HIGH'
           exit-code: '1'   
           trivy-config: 'trivy.yaml'

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'




      - name: upload this to report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy.txt

