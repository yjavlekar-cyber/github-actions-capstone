name: first-pipe

on:
  pull_request:
    branches: [ "main" ]
    types: [ opened, synchronize ]

jobs:
  sec:
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      run_tests: true


  pr-comment:
    runs-on: ubuntu-latest

    needs: sec

    steps:
      - name: print the branch name
        run: |
          BRANCH_NAME="${{ github.head_ref }}"
          echo "PR checks passed for branch: $BRANCH_NAME"
        
