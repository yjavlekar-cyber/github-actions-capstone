name: first-pipe

on:
  pull_request:
    branches: [ "main" ]
    types: [ opened, synchronize ]


permissions:
  contents: read
  pull-requests: write


jobs:
  sec:
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      run_tests: true


  pr-comment:
    runs-on: ubuntu-latest

    needs: sec

    steps:
      - name: print the branch name
        run: |
          BRANCH_NAME="${{ github.head_ref }}"
          echo "PR checks passed for branch: $BRANCH_NAME"

     - name: Check dependencies for vulnerabilites
       uses: action/dependency-review-action@v4
       with:
         fail-on-severity: critical


        
