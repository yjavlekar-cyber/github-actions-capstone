name: second


on:
  workflow_call:
    inputs:
      image:
        description: "image name"
        required: true
        type: string
        default: my-app

      tag:
        description: "image-tag"
        default: latest
        type: string

    secrets:
      DOCKER_USERNAME:
        default: true
          

      DOCKER_TOKEN:
        default: true

    outputs:
      my-outputs:
        value: ${{ jobs.reuse-sec.outputs.my-outputs }}



jobs:
  reuse-sec:
    runs-on: ubuntu-latest

    outputs:
      my_job_output: ${{ steps.image.outputs.my_job_output }}

    steps:
      - name: code checkout
        uses: actions/checkout@v4

      - name: docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}


      - name: docker build
        run: |

          docker build -t ${{ inputs.image }} .
          docker tag ${{ secrets.DOCKER_USERNAME }}/${{ inputs.image }}:${{ inputs.tag }}
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ inputs.image }}:${{ inputs.tag }}


      - name: set image output
        id: image
        run: echo "image_url=docker.io/${{ inputs.image }}:${{ inputs.tag }}" >> "$GITHUB_OUTPUT"

